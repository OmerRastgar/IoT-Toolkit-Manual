# Mosquitto Configuration File
# Documentation: https://mosquitto.org/man/mosquitto-conf-5.html

# Listen on all interfaces (0.0.0.0) on port 1883
listener 1883 0.0.0.0
# Allow anonymous connections (Easy for students/testing)
allow_anonymous true

# Secure Listener (Port 8883)
# To enable this, you must generate certificates and place them in the 'certs' folder
listener 8883
# cafile /mosquitto/certs/ca.crt
# certfile /mosquitto/certs/server.crt
# keyfile /mosquitto/certs/server.key
# require_certificate false

# Persistence setup
persistence true
persistence_location /mosquitto/data/

# Logging setup
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type information
log_type notice

# WebSockets support (Optional, for web-based dashboards)
listener 9001 0.0.0.0
protocol websockets
